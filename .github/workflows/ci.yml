name: Build, Scan and Push Image to GHCR

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "Dockerfile"
      - ".github/workflows/**"

  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "Dockerfile"
      - ".github/workflows/**"

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: uit-devops-project
  BACKEND_IMAGE: backend-app
  FRONTEND_IMAGE: frontend-app

jobs:
# =========================================================
# Detect changes
# =========================================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'Dockerfile'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - 'Dockerfile'
              - '.github/workflows/**'

# =========================================================
# SCAN JOBS (Gọi file template trivy-template.yaml)
# =========================================================
  scan-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    uses: ./.github/workflows/trivy-template.yaml
    with:
      context: ./backend
      component: backend

  scan-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    uses: ./.github/workflows/trivy-template.yaml
    with:
      context: ./frontend
      component: frontend

# =========================================================
# PUSH JOBS (Chỉ chạy nếu Scan vượt qua)
# =========================================================
  push-backend:
    needs: [detect-changes, scan-backend]
    if: needs.detect-changes.outputs.backend == 'true' && github.event_name == 'push'  # Chỉ login khi là push, không cần thiết khi là PR vì không push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          # Nếu là push (merge) -> push: true
          # Nếu là pull_request -> push: false (chỉ build để test)
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-frontend:
    needs: [detect-changes, scan-frontend]
    if: needs.detect-changes.outputs.frontend == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
