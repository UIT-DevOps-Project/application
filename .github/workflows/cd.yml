name: CD Pipeline (Release and Publish Image to GHCR)

on:
  push:
   tags:
    - 'v*.*.*'  # Trigger on version tags like v1.0.0

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: uit-devops-project
  BACKEND_IMAGE: backend-app
  FRONTEND_IMAGE: frontend-app

jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 #Phải lấy toàn bộ lịch sử git để GitHub tự động tính toán được các commit kể từ release gần nhất.

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # =========================================================
      # 1. BUILD & PUSH BACKEND
      # =========================================================
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # Sử dụng ${{ github.ref_name }} để lấy tên tag
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =========================================================
      # 2. BUILD & PUSH FRONTEND
      # =========================================================
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =========================================================
      # 3. TẠO GITHUB RELEASE VÀ AUTO-CHANGELOG
      # =========================================================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          # Tính năng giúp tự động liệt kê các commit/PR từ tag trước đó
          generate_release_notes: true 
          # Nối thêm thông tin Image vào phần description của Release
          append_body: true
          body: |
            ### 📦 Docker Images
            - **Backend:** `docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}`
            - **Frontend:** `docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}`
